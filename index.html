<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory</title>

    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/page-home.css">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/cards.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/logo-fav.png">
</head>

<body class="page-home">

    <header class="intro-header">
        <a href="/" class="home-link" aria-label="Go to homepage">
            <img src="images/logo-wide.png" alt="Hori Logo" class="logo">
            <span id="header-logo-text" class="header-logo-text"></span>
        </a>
        <div class="intro-header__actions">
            <a href="/maps/?feature=circles" id="btn-header-circles" class="header-icon-btn" aria-label="View all circles" title="View all circles">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="card-grid" id="json-content"></div>
    </main>
    <script src="/scripts/cards.js"></script>
    <script>
        const homeTiles = [
            {
                "id": 1,
                "image": "images/wetlands.jpg",
                "link": "/maps/",
                "category": "Spatial Data",
                "name": "Maps",
                "description": "View and access maps and spatial data files pertaining to the Eugene Christmas Bird Count."
            },
            {
                "id": 2,
                "image": "images/info.png",
                "link": "/info/",
                "category": "Resources",
                "name": "Information",
                "description": "Read about the organization's impact in citizen lead ornithology and how you can get involved."
            },
            {
                "id": 3,
                "image": "images/osprey.jpg",
                "link": "/results/",
                "category": "Data",
                "name": "Results",
                "description": "View and access historical species records created by members of the Eugene Christmas Bird Count."
            }
        ];
        // Fire the function when the page loads
        document.addEventListener("DOMContentLoaded", () => {
            renderCards(homeTiles, 'json-content');
        });
    </script>
</body>

</html>
